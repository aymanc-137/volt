<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Product Showcase Slider</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }

  /* Slide states for the product image */
  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transform: translateX(120%) scale(0.85);
    filter: blur(24px);
    transition:
      transform 1.2s cubic-bezier(.22,.61,.36,1),
      opacity   1.2s ease,
      filter    1.2s ease;
  }
  .slide.is-active {
    opacity: 1;
    transform: translateX(0) scale(1);
    filter: blur(0);
  }
  .slide.is-leaving {
    opacity: 0;
    transform: translateX(-120%) scale(0.85);
    filter: blur(24px);
  }
  .slide img {
    max-height: 75%;
    max-width: 75%;
    object-fit: contain;
    drop-shadow: 0 30px 60px rgba(0,0,0,.4);
    filter: drop-shadow(0 25px 35px rgba(0,0,0,0.45));
  }

  /* Info box fade */
  .info-box {
    transition: opacity .6s ease, transform .6s ease;
  }
  .info-box.fading {
    opacity: 0;
    transform: translateY(8px);
  }

  /* Decorative glow behind the image */
  .glow {
    position: absolute;
    width: 60%;
    height: 60%;
    border-radius: 9999px;
    background: radial-gradient(circle, rgba(168,85,247,.35), rgba(59,130,246,.15) 50%, transparent 70%);
    filter: blur(60px);
    z-index: 0;
    pointer-events: none;
  }
</style>
</head>
<body class="bg-slate-950 text-white">

<product-showcase></product-showcase>

<script>
class ProductShowcase extends HTMLElement {
  constructor() {
    super();
    this.products = [
      {
        name: "Aether X1 Headphones",
        tagline: "Sound, redefined.",
        price: "$349",
        description: "Hybrid active noise cancellation with 40h battery life and spatial audio engineered for studio precision.",
        specs: ["Bluetooth 5.4", "40h Battery", "Hi-Res Audio"],
        image: "https://images.unsplash.com/photo-1583394838336-acd977736f90?w=800&q=80",
        accent: "from-purple-500 to-blue-500"
      },
      {
        name: "Nova Smartwatch Pro",
        tagline: "Time, intelligently.",
        price: "$499",
        description: "Track your health, workouts and sleep with the most accurate biosensor array on a 1.9\" AMOLED display.",
        specs: ["AMOLED Display", "GPS + Cellular", "ECG Sensor"],
        image: "https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=800&q=80",
        accent: "from-emerald-500 to-cyan-500"
      },
      {
        name: "Lumen Camera 4K",
        tagline: "Capture every detail.",
        price: "$1,299",
        description: "Full-frame 45MP sensor with 8K video, in-body stabilization and a magnesium alloy weather-sealed body.",
        specs: ["45MP Sensor", "8K Video", "IBIS Stabilizer"],
        image: "https://images.unsplash.com/photo-1502920917128-1aa500764cbd?w=800&q=80",
        accent: "from-orange-500 to-pink-500"
      },
      {
        name: "Pulse Wireless Earbuds",
        tagline: "Tiny, but mighty.",
        price: "$199",
        description: "Adaptive EQ, transparency mode and seamless device switching in a stem-free, waterproof design.",
        specs: ["IP67 Rated", "ANC + Transparency", "30h w/ Case"],
        image: "https://images.unsplash.com/photo-1606220588913-b3aacb4d2f46?w=800&q=80",
        accent: "from-rose-500 to-amber-500"
      }
    ];
    this.current = 0;
    this.interval = 5000;
  }

  connectedCallback() {
    this.render();
    this.cacheRefs();
    this.buildSlides();
    this.show(0, true);
    this.start();
  }

  disconnectedCallback() {
    clearInterval(this.timer);
  }

  render() {
    this.innerHTML = `
      <section class="relative min-h-screen overflow-hidden bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
        <!-- background grid -->
        <div class="absolute inset-0 opacity-20"
             style="background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:60px 60px;"></div>

        <!-- header -->
        <header class="relative z-20 flex items-center justify-between px-8 py-6 md:px-16">
          <div class="text-xl font-bold tracking-tight">
            <span class="bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent">VOLT</span>
            <span class="ml-1 text-white/60 text-sm font-normal">Showcase</span>
          </div>
          <nav class="hidden md:flex gap-8 text-sm text-white/70">
            <a href="#" class="hover:text-white transition">Products</a>
            <a href="#" class="hover:text-white transition">Collections</a>
            <a href="#" class="hover:text-white transition">About</a>
          </nav>
        </header>

        <!-- main stage -->
        <div class="relative z-10 mx-auto flex h-[80vh] max-w-7xl items-center justify-center px-6">

          <!-- top-right info box -->
          <div data-info="top" class="info-box absolute top-4 right-4 md:top-10 md:right-12 z-20 max-w-xs rounded-2xl border border-white/10 bg-white/5 p-6 backdrop-blur-xl shadow-2xl">
            <div data-tagline class="text-xs uppercase tracking-[0.25em] text-purple-300 mb-2">—</div>
            <div data-name class="text-2xl font-bold leading-tight mb-2">—</div>
            <div data-price class="text-lg font-semibold bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent">—</div>
          </div>

          <!-- center slider stage -->
          <div class="relative h-[60vh] w-full max-w-3xl">
            <div class="glow left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2"></div>
            <div data-stage class="relative h-full w-full"></div>
          </div>

          <!-- bottom-left info box -->
          <div data-info="bottom" class="info-box absolute bottom-6 left-4 md:bottom-12 md:left-12 z-20 max-w-sm rounded-2xl border border-white/10 bg-white/5 p-6 backdrop-blur-xl shadow-2xl">
            <div data-desc class="text-sm leading-relaxed text-white/80 mb-4">—</div>
            <div data-specs class="flex flex-wrap gap-2"></div>
          </div>
        </div>

        <!-- controls / indicators -->
        <div class="relative z-20 flex items-center justify-center gap-3 pb-10">
          <button data-prev aria-label="Previous"
                  class="grid h-10 w-10 place-items-center rounded-full border border-white/20 text-white/80 hover:bg-white/10 transition">
            ‹
          </button>
          <div data-dots class="flex items-center gap-2"></div>
          <button data-next aria-label="Next"
                  class="grid h-10 w-10 place-items-center rounded-full border border-white/20 text-white/80 hover:bg-white/10 transition">
            ›
          </button>
        </div>
      </section>
    `;
  }

  cacheRefs() {
    this.stage = this.querySelector('[data-stage]');
    this.topBox = this.querySelector('[data-info="top"]');
    this.botBox = this.querySelector('[data-info="bottom"]');
    this.elTagline = this.querySelector('[data-tagline]');
    this.elName = this.querySelector('[data-name]');
    this.elPrice = this.querySelector('[data-price]');
    this.elDesc = this.querySelector('[data-desc]');
    this.elSpecs = this.querySelector('[data-specs]');
    this.dotsWrap = this.querySelector('[data-dots]');

    this.querySelector('[data-prev]').addEventListener('click', () => { this.show(this.current - 1); this.restart(); });
    this.querySelector('[data-next]').addEventListener('click', () => { this.show(this.current + 1); this.restart(); });

    this.addEventListener('mouseenter', () => clearInterval(this.timer));
    this.addEventListener('mouseleave', () => this.start());
  }

  buildSlides() {
    this.slides = this.products.map((p, i) => {
      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.innerHTML = `<img src="${p.image}" alt="${p.name}" loading="${i === 0 ? 'eager' : 'lazy'}" />`;
      this.stage.appendChild(slide);
      return slide;
    });

    this.dots = this.products.map((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'h-2 rounded-full bg-white/30 transition-all duration-500';
      dot.style.width = '8px';
      dot.addEventListener('click', () => { this.show(i); this.restart(); });
      this.dotsWrap.appendChild(dot);
      return dot;
    });
  }

  show(index, immediate = false) {
    const next = ((index % this.products.length) + this.products.length) % this.products.length;
    if (!immediate && next === this.current) return;

    const prev = this.current;
    this.current = next;

    // image slide transition
    this.slides.forEach((el, i) => {
      el.classList.remove('is-active', 'is-leaving');
      if (i === next) {
        // force reflow so the entering transform animates from the right
        void el.offsetWidth;
        el.classList.add('is-active');
      } else if (i === prev && !immediate) {
        el.classList.add('is-leaving');
      }
    });

    // dots
    this.dots.forEach((d, i) => {
      d.style.width = i === next ? '28px' : '8px';
      d.classList.toggle('bg-white', i === next);
      d.classList.toggle('bg-white/30', i !== next);
    });

    // info boxes fade swap
    this.swapInfo(this.products[next]);
  }

  swapInfo(p) {
    this.topBox.classList.add('fading');
    this.botBox.classList.add('fading');

    setTimeout(() => {
      this.elTagline.textContent = p.tagline;
      this.elName.textContent = p.name;
      this.elPrice.textContent = p.price;
      this.elDesc.textContent = p.description;
      this.elSpecs.innerHTML = p.specs.map(s =>
        `<span class="rounded-full border border-white/15 bg-white/5 px-3 py-1 text-xs text-white/80">${s}</span>`
      ).join('');

      this.topBox.classList.remove('fading');
      this.botBox.classList.remove('fading');
    }, 350);
  }

  start() {
    clearInterval(this.timer);
    this.timer = setInterval(() => this.show(this.current + 1), this.interval);
  }

  restart() {
    this.start();
  }
}

customElements.define('product-showcase', ProductShowcase);
</script>

</body>
</html>
